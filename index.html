<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Persona Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --text: #0f172a;
      --text-secondary: #475569;
      --text-muted: #94a3b8;
      --border: #e2e8f0;
      --border-light: #f1f5f9;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -2px rgba(0,0,0,0.05);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -4px rgba(0,0,0,0.04);
      --shadow-xl: 0 20px 25px -5px rgba(0,0,0,0.08), 0 8px 10px -6px rgba(0,0,0,0.04);
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --transition: 200ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ========== HEADER ========== */
    .header {
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #4338ca 100%);
      padding: 0;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(30, 27, 75, 0.3);
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px;
      max-width: 1440px;
      margin: 0 auto;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: rgba(255,255,255,0.15);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      backdrop-filter: blur(10px);
    }

    .logo-text h1 {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
    }

    .logo-text p {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      font-weight: 400;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .header-stats {
      display: flex;
      gap: 32px;
    }

    .stat {
      text-align: center;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: #fff;
    }

    .stat-label {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* ========== NAVIGATION BAR ========== */
    .nav-bar {
      background: rgba(0,0,0,0.15);
      backdrop-filter: blur(10px);
    }

    .nav-bar-inner {
      max-width: 1440px;
      margin: 0 auto;
      padding: 0 40px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-item {
      position: relative;
      padding: 12px 20px;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.7);
      cursor: pointer;
      transition: var(--transition);
      border-bottom: 2px solid transparent;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .nav-item:hover, .nav-item.active {
      color: #fff;
      border-bottom-color: rgba(255,255,255,0.5);
    }

    .nav-item.active {
      border-bottom-color: #818cf8;
    }

    .nav-item .badge {
      background: rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.8);
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 100px;
      font-weight: 600;
    }

    .nav-item .chevron {
      font-size: 10px;
      transition: transform var(--transition);
    }

    .nav-item.open .chevron {
      transform: rotate(180deg);
    }

    /* ========== DROPDOWN ========== */
    .dropdown-panel {
      position: absolute;
      top: 100%;
      left: 0;
      background: var(--surface);
      border-radius: 0 0 var(--radius-md) var(--radius-md);
      box-shadow: var(--shadow-xl);
      min-width: 260px;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-4px);
      transition: all var(--transition);
      z-index: 200;
      border: 1px solid var(--border);
      border-top: none;
      overflow: hidden;
    }

    .nav-item.open .dropdown-panel {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .dropdown-header {
      padding: 14px 18px 10px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      font-weight: 600;
      border-bottom: 1px solid var(--border-light);
    }

    .dropdown-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 18px;
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: var(--transition);
    }

    .dropdown-item:hover {
      background: var(--border-light);
      color: var(--text);
    }

    .dropdown-item.selected {
      background: #eef2ff;
      color: #4338ca;
      font-weight: 500;
    }

    .dropdown-item .count {
      font-size: 11px;
      color: var(--text-muted);
      background: var(--border-light);
      padding: 2px 8px;
      border-radius: 100px;
      font-weight: 500;
    }

    .dropdown-item.selected .count {
      background: #c7d2fe;
      color: #4338ca;
    }

    /* ========== SEARCH BAR ========== */
    .search-section {
      max-width: 1440px;
      margin: 0 auto;
      padding: 28px 40px 0;
    }

    .search-container {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .search-box {
      flex: 1;
      position: relative;
    }

    .search-box input {
      width: 100%;
      padding: 14px 20px 14px 48px;
      font-size: 14px;
      font-family: inherit;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      background: var(--surface);
      color: var(--text);
      transition: var(--transition);
      box-shadow: var(--shadow-sm);
    }

    .search-box input:focus {
      outline: none;
      border-color: #818cf8;
      box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.15);
    }

    .search-box input::placeholder {
      color: var(--text-muted);
    }

    .search-box .search-icon {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 16px;
    }

    .active-filters {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filter-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: #eef2ff;
      color: #4338ca;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
    }

    .filter-chip:hover {
      background: #c7d2fe;
    }

    .filter-chip .remove {
      font-size: 14px;
      line-height: 1;
      opacity: 0.6;
    }

    .filter-chip .remove:hover {
      opacity: 1;
    }

    .clear-all {
      padding: 8px 14px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 100px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      font-family: inherit;
      transition: var(--transition);
    }

    .clear-all:hover {
      background: var(--border-light);
      color: var(--text);
    }

    /* ========== BREADCRUMB ========== */
    .breadcrumb-bar {
      max-width: 1440px;
      margin: 0 auto;
      padding: 16px 40px 0;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .breadcrumb-bar span {
      cursor: pointer;
      transition: var(--transition);
    }

    .breadcrumb-bar span:hover {
      color: var(--text);
    }

    .breadcrumb-bar .sep {
      cursor: default;
    }

    .breadcrumb-bar .current {
      color: var(--text);
      font-weight: 500;
      cursor: default;
    }

    .results-count {
      margin-left: auto;
      font-size: 13px;
      color: var(--text-muted);
    }

    /* ========== MAIN CONTENT ========== */
    .main-content {
      max-width: 1440px;
      margin: 0 auto;
      padding: 24px 40px 60px;
    }

    /* ========== CATEGORY SECTION ========== */
    .category-section {
      margin-bottom: 48px;
    }

    .category-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--border);
    }

    .category-badge {
      font-size: 16px;
      font-weight: 800;
      color: #fff;
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      letter-spacing: 1px;
    }

    .category-info h2 {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .category-info p {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    /* ========== GROUP SECTION ========== */
    .group-section {
      margin-bottom: 32px;
    }

    .group-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .group-header h3 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    .group-header .group-count {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      background: var(--border-light);
      padding: 3px 10px;
      border-radius: 100px;
    }

    .group-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ========== PERSONA CARDS ========== */
    .personas-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
    }

    .persona-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
      transition: all var(--transition);
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .persona-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      transition: var(--transition);
    }

    .persona-card:hover {
      box-shadow: var(--shadow-lg);
      transform: translateY(-2px);
      border-color: transparent;
    }

    .persona-card-header {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 14px;
    }

    .persona-avatar {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-md);
      flex-shrink: 0;
      overflow: hidden;
      box-shadow: 0 0 0 2px rgba(0,0,0,0.06);
    }

    .persona-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .persona-meta {
      flex: 1;
      min-width: 0;
    }

    .persona-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 2px;
    }

    .persona-role {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .persona-tenure {
      display: inline-block;
      font-size: 11px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 100px;
      margin-top: 6px;
    }

    .persona-description {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 16px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .persona-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .persona-tag {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 100px;
      font-weight: 500;
    }

    /* ========== PERSONA MODAL ========== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.5);
      backdrop-filter: blur(4px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      opacity: 0;
      visibility: hidden;
      transition: all 300ms ease;
    }

    .modal-overlay.open {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      background: var(--surface);
      border-radius: var(--radius-xl);
      max-width: 680px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: var(--shadow-xl);
      transform: scale(0.95) translateY(10px);
      transition: transform 300ms ease;
    }

    .modal-overlay.open .modal {
      transform: scale(1) translateY(0);
    }

    .modal-top {
      padding: 32px 32px 0;
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: var(--border-light);
      color: var(--text-secondary);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
    }

    .modal-close:hover {
      background: var(--border);
      color: var(--text);
    }

    .modal-avatar {
      width: 80px;
      height: 80px;
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-bottom: 16px;
      box-shadow: 0 0 0 3px rgba(0,0,0,0.06);
    }

    .modal-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .modal-name {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.5px;
    }

    .modal-role {
      font-size: 14px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    .modal-badges {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .modal-badge {
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 100px;
      font-weight: 500;
    }

    .modal-body {
      padding: 24px 32px 32px;
    }

    .modal-description {
      font-size: 14px;
      line-height: 1.7;
      color: var(--text-secondary);
      margin-bottom: 28px;
    }

    .modal-section {
      margin-bottom: 24px;
    }

    .modal-section-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      font-weight: 600;
      margin-bottom: 10px;
    }

    .modal-list {
      list-style: none;
    }

    .modal-list li {
      padding: 8px 0;
      font-size: 13px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border-light);
    }

    .modal-list li:last-child {
      border-bottom: none;
    }

    .modal-list li .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ========== EMPTY STATE ========== */
    .empty-state {
      text-align: center;
      padding: 80px 40px;
    }

    .empty-state .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .empty-state h3 {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }

    .empty-state p {
      font-size: 14px;
      color: var(--text-secondary);
    }

    /* ========== RESPONSIVE ========== */
    @media (max-width: 768px) {
      .header-top { padding: 16px 20px; }
      .header-stats { display: none; }
      .nav-bar-inner { padding: 0 20px; overflow-x: auto; }
      .search-section { padding: 20px 20px 0; }
      .breadcrumb-bar { padding: 12px 20px 0; }
      .main-content { padding: 20px 20px 40px; }
      .personas-grid { grid-template-columns: 1fr; }
      .modal-overlay { padding: 20px; }
      .modal-top, .modal-body { padding-left: 24px; padding-right: 24px; }
    }

    /* ========== HIGHLIGHT ANIMATION ========== */
    .highlight {
      background: #fef08a;
      border-radius: 2px;
      padding: 0 2px;
    }

    /* ========== SCROLLBAR ========== */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-top">
      <div class="logo-area">
        <div class="logo-icon">&#x1F465;</div>
        <div class="logo-text">
          <h1>Persona Library</h1>
          <p>Design &amp; Strategy</p>
        </div>
      </div>
      <div class="header-stats" id="headerStats"></div>
    </div>

    <nav class="nav-bar">
      <div class="nav-bar-inner" id="navBar"></div>
    </nav>
  </header>

  <!-- SEARCH -->
  <section class="search-section">
    <div class="search-container">
      <div class="search-box">
        <span class="search-icon">&#x1F50D;</span>
        <input type="text" id="searchInput" placeholder="Search personas by name, role, description, or keywords..." />
      </div>
    </div>
    <div class="active-filters" id="activeFilters"></div>
  </section>

  <!-- BREADCRUMB -->
  <div class="breadcrumb-bar" id="breadcrumb"></div>

  <!-- MAIN CONTENT -->
  <main class="main-content" id="mainContent"></main>

  <!-- MODAL -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modalContent"></div>
  </div>

  <script src="data.js"></script>
  <script>
    // ===== STATE =====
    let state = {
      selectedCategory: null,
      selectedGroup: null,
      searchQuery: '',
      openNav: null
    };

    // ===== HELPERS =====
    function getInitials(name) {
      return name.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
    }

    function getAllPersonas() {
      const result = [];
      personaData.categories.forEach(cat => {
        cat.groups.forEach(group => {
          group.personas.forEach(persona => {
            result.push({ ...persona, category: cat, group });
          });
        });
      });
      return result;
    }

    function getFilteredPersonas() {
      let personas = getAllPersonas();

      if (state.selectedCategory) {
        personas = personas.filter(p => p.category.id === state.selectedCategory);
      }
      if (state.selectedGroup) {
        personas = personas.filter(p => p.group.id === state.selectedGroup);
      }
      if (state.searchQuery) {
        const q = state.searchQuery.toLowerCase();
        personas = personas.filter(p =>
          p.name.toLowerCase().includes(q) ||
          p.role.toLowerCase().includes(q) ||
          p.description.toLowerCase().includes(q) ||
          p.coreNeeds.some(n => n.toLowerCase().includes(q)) ||
          p.motivations.some(m => m.toLowerCase().includes(q)) ||
          p.frustrations.some(f => f.toLowerCase().includes(q)) ||
          p.category.name.toLowerCase().includes(q) ||
          p.category.fullName.toLowerCase().includes(q) ||
          p.group.name.toLowerCase().includes(q)
        );
      }

      return personas;
    }

    function getTotalPersonaCount() {
      return getAllPersonas().length;
    }

    function getCategoryCount(catId) {
      return getAllPersonas().filter(p => p.category.id === catId).length;
    }

    function getGroupCount(groupId) {
      return getAllPersonas().filter(p => p.group.id === groupId).length;
    }

    // ===== RENDER HEADER STATS =====
    function renderHeaderStats() {
      const stats = document.getElementById('headerStats');
      const totalPersonas = getTotalPersonaCount();
      const totalCategories = personaData.categories.length;
      const totalGroups = personaData.categories.reduce((sum, c) => sum + c.groups.length, 0);

      stats.innerHTML = `
        <div class="stat">
          <div class="stat-value">${totalPersonas}</div>
          <div class="stat-label">Personas</div>
        </div>
        <div class="stat">
          <div class="stat-value">${totalCategories}</div>
          <div class="stat-label">Categories</div>
        </div>
        <div class="stat">
          <div class="stat-value">${totalGroups}</div>
          <div class="stat-label">Groups</div>
        </div>
      `;
    }

    // ===== RENDER NAV =====
    function renderNav() {
      const nav = document.getElementById('navBar');

      const allItem = `
        <div class="nav-item ${!state.selectedCategory ? 'active' : ''}" data-action="show-all">
          All
          <span class="badge">${getTotalPersonaCount()}</span>
        </div>
      `;

      const catItems = personaData.categories.map(cat => {
        const isActive = state.selectedCategory === cat.id;
        const isOpen = state.openNav === cat.id;
        const groups = cat.groups.map(group => {
          const isGroupSelected = state.selectedGroup === group.id;
          return `
            <div class="dropdown-item ${isGroupSelected ? 'selected' : ''}" data-action="select-group" data-group-id="${group.id}" data-cat-id="${cat.id}">
              ${group.name}
              <span class="count">${getGroupCount(group.id)}</span>
            </div>
          `;
        }).join('');

        return `
          <div class="nav-item ${isActive ? 'active' : ''} ${isOpen ? 'open' : ''}" data-action="toggle-nav" data-cat-id="${cat.id}">
            ${cat.name}
            <span class="badge">${getCategoryCount(cat.id)}</span>
            <span class="chevron">&#x25BC;</span>
            <div class="dropdown-panel">
              <div class="dropdown-header">${cat.fullName}</div>
              <div class="dropdown-item ${isActive && !state.selectedGroup ? 'selected' : ''}" data-action="select-category" data-cat-id="${cat.id}">
                All ${cat.name} Personas
                <span class="count">${getCategoryCount(cat.id)}</span>
              </div>
              ${groups}
            </div>
          </div>
        `;
      }).join('');

      nav.innerHTML = allItem + catItems;
    }

    // ===== RENDER FILTERS =====
    function renderFilters() {
      const container = document.getElementById('activeFilters');
      const chips = [];

      if (state.selectedCategory) {
        const cat = personaData.categories.find(c => c.id === state.selectedCategory);
        chips.push(`
          <div class="filter-chip" data-action="remove-category">
            ${cat.name}: ${cat.fullName}
            <span class="remove">&times;</span>
          </div>
        `);
      }

      if (state.selectedGroup) {
        let groupName = '';
        personaData.categories.forEach(c => {
          c.groups.forEach(g => {
            if (g.id === state.selectedGroup) groupName = g.name;
          });
        });
        chips.push(`
          <div class="filter-chip" data-action="remove-group">
            ${groupName}
            <span class="remove">&times;</span>
          </div>
        `);
      }

      if (chips.length > 0) {
        chips.push(`<button class="clear-all" data-action="clear-all">Clear all</button>`);
      }

      container.innerHTML = chips.join('');
      container.style.marginTop = chips.length > 0 ? '12px' : '0';
    }

    // ===== RENDER BREADCRUMB =====
    function renderBreadcrumb() {
      const bar = document.getElementById('breadcrumb');
      const filtered = getFilteredPersonas();
      const parts = [`<span data-action="show-all">All Personas</span>`];

      if (state.selectedCategory) {
        const cat = personaData.categories.find(c => c.id === state.selectedCategory);
        parts.push(`<span class="sep">&#x203A;</span>`);
        parts.push(`<span data-action="select-category-bc" data-cat-id="${cat.id}">${cat.fullName}</span>`);
      }

      if (state.selectedGroup) {
        let groupName = '';
        personaData.categories.forEach(c => {
          c.groups.forEach(g => {
            if (g.id === state.selectedGroup) groupName = g.name;
          });
        });
        parts.push(`<span class="sep">&#x203A;</span>`);
        parts.push(`<span class="current">${groupName}</span>`);
      }

      parts.push(`<span class="results-count">${filtered.length} persona${filtered.length !== 1 ? 's' : ''}</span>`);

      bar.innerHTML = parts.join('');
    }

    // ===== RENDER CONTENT =====
    function renderContent() {
      const main = document.getElementById('mainContent');
      const filtered = getFilteredPersonas();

      if (filtered.length === 0) {
        main.innerHTML = `
          <div class="empty-state">
            <div class="icon">&#x1F50E;</div>
            <h3>No personas found</h3>
            <p>Try adjusting your search or filters to find what you're looking for.</p>
          </div>
        `;
        return;
      }

      const grouped = {};
      filtered.forEach(p => {
        const catKey = p.category.id;
        const groupKey = p.group.id;
        if (!grouped[catKey]) grouped[catKey] = { category: p.category, groups: {} };
        if (!grouped[catKey].groups[groupKey]) grouped[catKey].groups[groupKey] = { group: p.group, personas: [] };
        grouped[catKey].groups[groupKey].personas.push(p);
      });

      let html = '';

      Object.values(grouped).forEach(catData => {
        const cat = catData.category;
        html += `
          <section class="category-section">
            <div class="category-header">
              <div class="category-badge" style="background:${cat.color}">${cat.name}</div>
              <div class="category-info">
                <h2>${cat.fullName}</h2>
                <p>${cat.description}</p>
              </div>
            </div>
        `;

        Object.values(catData.groups).forEach(groupData => {
          const group = groupData.group;
          html += `
            <div class="group-section">
              <div class="group-header">
                <div class="group-dot" style="background:${cat.color}"></div>
                <h3>${group.name}</h3>
                <span class="group-count">${groupData.personas.length}</span>
              </div>
              <div class="personas-grid">
          `;

          groupData.personas.forEach(persona => {
            const avatarUrl = persona.avatar || `https://api.dicebear.com/9.x/initials/svg?seed=${encodeURIComponent(persona.name)}`;
            const needsTags = persona.coreNeeds.slice(0, 3).map(n =>
              `<span class="persona-tag" style="background:${cat.colorLight};color:${cat.color}">${highlightText(n)}</span>`
            ).join('');

            html += `
              <div class="persona-card" data-action="open-persona" data-persona-id="${persona.id}" style="--card-color:${cat.color}">
                <div style="position:absolute;top:0;left:0;right:0;height:3px;background:${cat.color}"></div>
                <div class="persona-card-header">
                  <div class="persona-avatar"><img src="${avatarUrl}" alt="${persona.name}" loading="lazy" /></div>
                  <div class="persona-meta">
                    <div class="persona-name">${highlightText(persona.name)}</div>
                    <div class="persona-role">${highlightText(persona.role)}</div>
                    <span class="persona-tenure" style="background:${cat.colorLight};color:${cat.color}">${persona.tenure}</span>
                  </div>
                </div>
                <div class="persona-description">${highlightText(persona.description)}</div>
                <div class="persona-tags">${needsTags}</div>
              </div>
            `;
          });

          html += `</div></div>`;
        });

        html += `</section>`;
      });

      main.innerHTML = html;
    }

    function highlightText(text) {
      if (!state.searchQuery) return text;
      const q = state.searchQuery.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const regex = new RegExp(`(${q})`, 'gi');
      return text.replace(regex, '<span class="highlight">$1</span>');
    }

    // ===== RENDER MODAL =====
    function renderModal(personaId) {
      const allPersonas = getAllPersonas();
      const persona = allPersonas.find(p => p.id === personaId);
      if (!persona) return;

      const cat = persona.category;
      const avatarUrl = persona.avatar || `https://api.dicebear.com/9.x/initials/svg?seed=${encodeURIComponent(persona.name)}`;

      const modal = document.getElementById('modalContent');
      modal.innerHTML = `
        <div class="modal-top">
          <button class="modal-close" data-action="close-modal">&times;</button>
          <div class="modal-avatar"><img src="${avatarUrl}" alt="${persona.name}" /></div>
          <div class="modal-name">${persona.name}</div>
          <div class="modal-role">${persona.role}</div>
          <div class="modal-badges">
            <span class="modal-badge" style="background:${cat.colorLight};color:${cat.color}">${cat.name}</span>
            <span class="modal-badge" style="background:${cat.colorLight};color:${cat.color}">${persona.group.name}</span>
            <span class="modal-badge" style="background:#f1f5f9;color:#475569">${persona.tenure}</span>
          </div>
        </div>
        <div class="modal-body">
          <div class="modal-description">${persona.description}</div>

          <div class="modal-section">
            <div class="modal-section-title">Core Needs</div>
            <ul class="modal-list">
              ${persona.coreNeeds.map(n => `<li><span class="dot" style="background:#4338ca"></span>${n}</li>`).join('')}
            </ul>
          </div>

          <div class="modal-section">
            <div class="modal-section-title">Motivations</div>
            <ul class="modal-list">
              ${persona.motivations.map(m => `<li><span class="dot" style="background:#059669"></span>${m}</li>`).join('')}
            </ul>
          </div>

          <div class="modal-section">
            <div class="modal-section-title">Frustrations</div>
            <ul class="modal-list">
              ${persona.frustrations.map(f => `<li><span class="dot" style="background:#dc2626"></span>${f}</li>`).join('')}
            </ul>
          </div>
        </div>
      `;

      document.getElementById('modalOverlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('open');
      document.body.style.overflow = '';
    }

    // ===== RENDER ALL =====
    function render() {
      renderHeaderStats();
      renderNav();
      renderFilters();
      renderBreadcrumb();
      renderContent();
    }

    // ===== EVENT HANDLERS =====
    document.addEventListener('click', (e) => {
      const target = e.target.closest('[data-action]');
      if (!target) {
        if (!e.target.closest('.nav-item')) {
          state.openNav = null;
          renderNav();
        }
        return;
      }

      const action = target.dataset.action;

      switch (action) {
        case 'show-all':
          state.selectedCategory = null;
          state.selectedGroup = null;
          state.openNav = null;
          render();
          break;

        case 'toggle-nav':
          e.stopPropagation();
          const catId = target.dataset.catId;
          state.openNav = state.openNav === catId ? null : catId;
          renderNav();
          break;

        case 'select-category':
          e.stopPropagation();
          state.selectedCategory = target.dataset.catId;
          state.selectedGroup = null;
          state.openNav = null;
          render();
          break;

        case 'select-group':
          e.stopPropagation();
          state.selectedCategory = target.dataset.catId;
          state.selectedGroup = target.dataset.groupId;
          state.openNav = null;
          render();
          break;

        case 'select-category-bc':
          state.selectedCategory = target.dataset.catId;
          state.selectedGroup = null;
          render();
          break;

        case 'remove-category':
          state.selectedCategory = null;
          state.selectedGroup = null;
          render();
          break;

        case 'remove-group':
          state.selectedGroup = null;
          render();
          break;

        case 'clear-all':
          state.selectedCategory = null;
          state.selectedGroup = null;
          state.searchQuery = '';
          document.getElementById('searchInput').value = '';
          render();
          break;

        case 'open-persona':
          renderModal(target.dataset.personaId);
          break;

        case 'close-modal':
          closeModal();
          break;
      }
    });

    document.getElementById('modalOverlay').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeModal();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });

    let searchTimeout;
    document.getElementById('searchInput').addEventListener('input', (e) => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        state.searchQuery = e.target.value.trim();
        renderBreadcrumb();
        renderContent();
      }, 200);
    });

    // ===== INIT =====
    render();
  </script>
</body>
</html>
