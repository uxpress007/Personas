<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archetypes — Customer Insight Frameworks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f8fafc;
      --surface: #fff;
      --text: #0f172a;
      --text-secondary: #475569;
      --border: #e2e8f0;
      --navy: #1a2c42;
      --navy-light: #2d3e52;
      --accent: #2196F3;
      --radius: 10px;
      --shadow: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -2px rgba(0,0,0,0.05);
    }
    body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; -webkit-font-smoothing: antialiased; }

    .header {
      background: var(--navy);
      padding: 16px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .header-left { display: flex; align-items: center; gap: 24px; }
    .header a {
      color: rgba(255,255,255,0.9);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
    }
    .header a:hover { color: #fff; }
    .header .brand { font-weight: 700; font-size: 18px; }
    .header .back { opacity: 0.9; }

    .page-title {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 40px 24px;
    }
    .page-title h1 { font-size: 32px; font-weight: 800; letter-spacing: -0.5px; color: var(--text); }
    .page-title p { font-size: 16px; color: var(--text-secondary); margin-top: 8px; }

    .content {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 40px 60px;
    }
    .archetypes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
    }
    .archetype-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: box-shadow 200ms ease, transform 200ms ease;
    }
    .archetype-card:hover {
      box-shadow: var(--shadow);
      transform: translateY(-2px);
    }
    .archetype-card-top { display: flex; align-items: flex-start; gap: 16px; }
    .archetype-card-avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
      background: var(--navy);
    }
    .archetype-card-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .archetype-card-name { font-size: 20px; font-weight: 700; color: var(--text); }
    .archetype-card-role { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
    .archetype-card-tagline { font-size: 13px; color: var(--text-secondary); font-style: italic; margin-top: 12px; line-height: 1.5; }
    @media (max-width: 768px) {
      .header { padding: 16px 20px; }
      .page-title, .content { padding-left: 20px; padding-right: 20px; }
      .archetypes-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-left">
      <a href="index.html" class="brand">Customer Insight Frameworks</a>
      <a href="index.html" class="back">&larr; Guide</a>
      <a href="library.html">Persona Library</a>
    </div>
    <a href="library.html">Personas</a>
  </header>

  <div class="page-title">
    <h1>Archetypes</h1>
    <p>Broader psychological and role-based patterns that represent how people work, collaborate, and use technology across the organization. Open each archetype on its own page for the full profile.</p>
  </div>

  <div class="content">
    <div class="archetypes-grid" id="archetypesGrid"></div>
  </div>

  <script src="archetype-data.js"></script>
  <script>
    const grid = document.getElementById('archetypesGrid');
    archetypeData.archetypes.forEach(a => {
      const imgSrc = a.avatar;
      const initials = a.name.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
      grid.innerHTML += `
        <a class="archetype-card" href="archetype.html?id=${a.id}">
          <div class="archetype-card-top">
            <div class="archetype-card-avatar"><img src="${imgSrc}" alt="${a.name}" loading="lazy" data-initials="${initials}" onerror="var d=document.createElement('div');d.className='archetype-card-avatar';d.style.cssText='display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:20px';d.textContent=this.getAttribute('data-initials')||'?';this.parentNode.replaceChild(d,this)"/></div>
            <div>
              <div class="archetype-card-name">${a.name}</div>
              <div class="archetype-card-role">${a.role}</div>
            </div>
          </div>
          <div class="archetype-card-tagline">${a.tagline}</div>
        </a>
      `;
    });
  </script>
</body>
</html>
