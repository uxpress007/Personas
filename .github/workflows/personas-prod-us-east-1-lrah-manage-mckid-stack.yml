name: personas-prod-us-Manage McKID stack

on:
  workflow_dispatch:
    inputs:
      operation:
        description: 'Operation to perform'
        type: choice
        required: true
        options:
          - grant-app-access
          - revoke-app-access
          - add-stack-member
          - remove-stack-member
          - add-group-member
          - remove-group-member
          - create-pkce-asset
          - update-asset-redirect-uris
          - list-stack-details
      asset_name:
        description: 'Name for the new PKCE asset (for create-pkce-asset)'
        type: string
        required: false
      redirect_uris:
        description: 'Comma-separated redirect URIs (for update-asset-redirect-uris)'
        type: string
        required: false
      cors_origins:
        description: 'Comma-separated CORS origins (for update-asset-redirect-uris)'
        type: string
        required: false
      member_email:
        description: 'Email addresses separated by comma or space (for member/group operations; supports batch)'
        type: string
        required: false
      group_name:
        description: 'Full group name from MCKID_GROUP_NAME variable (for group operations)'
        type: string
        required: false

jobs:
  mckid-manage:
    name: McKID ${{ github.event.inputs.operation }}
    runs-on: [gh-larger-linux-mini]
    environment: personas-prod-us-east-1
    env:
      MCKID_API_URL: ${{ vars.MCKID_API_URL }}
      MCKID_STACK_ID: ${{ vars.MCKID_STACK_ID }}
      USER_ENVIRONMENT_ID: ${{ vars.USER_ENVIRONMENT_ID }}

    steps:
      - name: Validate prerequisites
        run: |
          set -euo pipefail
          echo "Operation: ${{ github.event.inputs.operation }}"
          echo "McKID Stack ID: ${MCKID_STACK_ID}"

          if [ -z "${MCKID_STACK_ID}" ]; then
            echo "::error::MCKID_STACK_ID is not set. McKID was not provisioned for this instance."
            exit 1
          fi

      - name: Generate McKID API token (per-stack SA)
        env:
          MCKID_AUTH_PROTOCOL_URL: ${{ vars.MCKID_AUTH_PROTOCOL_URL }}
          MCKID_SVC_ACC_CLIENT_ID: ${{ secrets.MCKID_SVC_ACC_CLIENT_ID }}
          MCKID_SVC_ACC_CLIENT_SECRET: ${{ secrets.MCKID_SVC_ACC_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          AUTH_RESPONSE=$(curl -sS --connect-timeout 10 --max-time 30 \
            -L "${MCKID_AUTH_PROTOCOL_URL}/openid-connect/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials" \
            -d "client_id=${MCKID_SVC_ACC_CLIENT_ID}" \
            -d "client_secret=${MCKID_SVC_ACC_CLIENT_SECRET}")

          if ! echo "$AUTH_RESPONSE" | jq empty 2>/dev/null; then
            echo "::error::McKID auth endpoint returned non-JSON response"
            exit 1
          fi

          TOKEN=$(echo "$AUTH_RESPONSE" | jq -r '.access_token')

          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "::error::Failed to obtain McKID API token. Check that per-stack SA credentials exist in GitHub environment secrets (MCKID_SVC_ACC_CLIENT_ID, MCKID_SVC_ACC_CLIENT_SECRET)."
            exit 1
          fi
          echo "::add-mask::${TOKEN}"
          echo "MCKID_API_TOKEN=${TOKEN}" >> "$GITHUB_ENV"
          echo "McKID API token obtained successfully (per-stack scoped SA)"

      - name: Setup utilities
        run: |
          cat > /tmp/mckid_utils.sh << 'UTILS_SCRIPT'
          #!/usr/bin/env bash
          set -euo pipefail

          if ! command -v jq >/dev/null 2>&1; then
            echo "::error::jq is required but was not found on PATH"
            exit 1
          fi

          # --- PII Masking ---

          mask_email() {
            local email="${1:-}"
            if [[ -z "$email" || "$email" != *@* ]]; then printf '%s' "[redacted]"; return; fi
            local local_part="${email%%@*}"
            local domain="${email##*@}"
            local masked="" seg first_seg=true
            IFS='_' read -ra segments <<< "$local_part"
            for seg in "${segments[@]}"; do
              [[ "$first_seg" == true ]] && first_seg=false || masked+="_"
              if [[ -n "$seg" ]]; then
                masked+="${seg:0:1}*****"
              else
                masked+="*****"
              fi
            done
            printf '%s' "${masked}@${domain}"
          }

          mask_pii_json() {
            local json="${1:-}"
            if [[ -z "$json" ]]; then echo "{}"; return; fi
            printf '%s' "$json" | jq '
              def _walk(f):
                . as $in |
                if type == "object" then
                  reduce keys_unsorted[] as $k (
                    {}; . + {($k): ($in[$k] | _walk(f))}
                  ) | f
                elif type == "array" then map(_walk(f)) | f
                else f end;

              def mask_seg:
                if type == "string" and length > 0 then .[0:1] + "*****"
                else "*****" end;

              def mask_email_val:
                if type == "string" and contains("@") then
                  split("@") | .[0] as $local | .[1] as $domain |
                  ($local | split("_") | map(mask_seg) | join("_"))
                  + "@" + $domain
                else . end;

              def mask_name_val:
                if type == "string" and length > 0 then
                  .[0:1] + "*****"
                else . end;

              def key_matches(pat):
                ascii_downcase | test(pat);

              _walk(
                if type == "object" then
                  with_entries(
                    if (.key | key_matches("token|secret|password|authorization|key$"))
                       and (.value | type == "string") and (.value | length > 0)
                    then .value = "***REDACTED***"
                    elif .key == "login" or .key == "email" or .key == "mail"
                      or .key == "upn" or .key == "userPrincipalName"
                    then .value |= mask_email_val
                    elif .key == "firstName" or .key == "lastName" or .key == "displayName"
                    then .value |= mask_name_val
                    else . end
                  )
                  | if has("name") and (has("firstName") or has("lastName") or has("displayName"))
                    then .name |= mask_name_val else . end
                else . end
              )
            '
          }

          # --- Batch Helpers ---

          # Normalize comma-or-space-separated emails: trim whitespace, drop blanks.
          # Accepts "a@x.com,b@x.com", "a@x.com b@x.com", or "a@x.com, b@x.com".
          # Output: one email per line (pipe to jq -R for JSON strings).
          normalize_emails() {
            echo "$1" | tr ',[:space:]' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | sed '/^$/d'
          }

          # Register raw emails with GitHub Actions ::add-mask:: so they are
          # redacted from all subsequent log lines.  Must be called OUTSIDE
          # command substitution ($()) so the workflow commands reach the runner.
          register_email_masks() {
            local emails="$1"
            while IFS= read -r email; do
              [ -z "$email" ] && continue
              echo "::add-mask::${email}"
            done < <(normalize_emails "$emails")
          }

          # Return comma-separated masked emails for display in log messages.
          # Does NOT emit ::add-mask:: — call register_email_masks first.
          mask_emails_batch() {
            local emails="$1" result=""
            while IFS= read -r email; do
              [ -z "$email" ] && continue
              local masked
              masked=$(mask_email "$email")
              if [ -n "$result" ]; then result="${result}, ${masked}"; else result="${masked}"; fi
            done < <(normalize_emails "$emails")
            printf '%s' "$result"
          }

          # Count non-empty items in a comma-or-space-separated list.
          count_csv() {
            normalize_emails "$1" | wc -l | xargs
          }

          # Validate that every normalized email is well-formed and safe for
          # GraphQL string embedding.  Rejects entries without '@', and entries
          # containing characters that could break query syntax (double-quotes,
          # backslashes, whitespace).
          # Usage: validate_emails "$RAW_INPUT"
          # Exits 1 on the first invalid entry.
          validate_emails() {
            local raw="$1"
            while IFS= read -r addr; do
              [ -z "$addr" ] && continue
              if [[ "$addr" != *@* ]]; then
                echo "::error::Invalid email (missing @): $(mask_email "$addr")"
                exit 1
              fi
              if [[ "$addr" =~ [\"\\[:space:]] ]]; then
                echo "::error::Invalid email (contains unsafe characters): $(mask_email "$addr")"
                exit 1
              fi
            done < <(normalize_emails "$raw")
          }

          # --- API Helpers ---

          # Execute a McKID GraphQL request with validation and error handling.
          # Usage: mckid_gql "$PAYLOAD"
          # Sets global: RESPONSE
          # Exits 1 on HTTP/JSON failure or GraphQL errors.
          mckid_gql() {
            local payload="$1"
            RESPONSE=$(curl -sS --connect-timeout 10 --max-time 30 \
              -H "Authorization: Bearer ${MCKID_API_TOKEN}" \
              -H "Content-Type: application/json" \
              "${MCKID_API_URL}" \
              -d "$payload")

            if ! echo "$RESPONSE" | jq empty 2>/dev/null; then
              echo "::error::McKID API returned non-JSON response"
              exit 1
            fi

            if echo "$RESPONSE" | jq -e '(.errors? // []) | length > 0' >/dev/null 2>&1; then
              echo "::error::McKID API returned errors:"
              echo "$RESPONSE" | jq '.errors[] | {message: .message}'
              exit 1
            fi
          }

          # Like mckid_gql but returns 1 on error instead of exiting.
          # Use for batch loops where individual failures should not abort the run.
          mckid_gql_soft() {
            local payload="$1"
            RESPONSE=$(curl -sS --connect-timeout 10 --max-time 30 \
              -H "Authorization: Bearer ${MCKID_API_TOKEN}" \
              -H "Content-Type: application/json" \
              "${MCKID_API_URL}" \
              -d "$payload")

            if ! echo "$RESPONSE" | jq empty 2>/dev/null; then
              echo "::warning::McKID API returned non-JSON response"
              return 1
            fi

            if echo "$RESPONSE" | jq -e '(.errors? // []) | length > 0' >/dev/null 2>&1; then
              echo "::warning::McKID API error: $(echo "$RESPONSE" | jq -r '.errors[0].message // "unknown"')"
              return 1
            fi
            return 0
          }

          # Resolve a group label to its ID within the stack.
          # Usage: resolve_group_id "$GROUP_LABEL"
          # Sets global: GROUP_ID
          # Exits 1 if group not found.
          resolve_group_id() {
            local group_label="$1"

            local payload
            payload=$(jq -n --arg sid "$MCKID_STACK_ID" \
              '{query: ("query { Stack(id: \"" + $sid + "\") { members { __typename ... on Group { id label } ... on GroupInheritedByRule { id label } } } }")}')

            mckid_gql "$payload"

            GROUP_ID=$(echo "$RESPONSE" | jq -r --arg gl "$group_label" \
              '[.data.Stack | if type == "array" then .[0] else . end | .members[] | select(.label == $gl) | .id] | .[0] // empty')

            if [ -z "$GROUP_ID" ]; then
              echo "::error::Could not find group ${group_label} in stack ${MCKID_STACK_ID}"
              exit 1
            fi
          }
          UTILS_SCRIPT
          chmod +x /tmp/mckid_utils.sh
          echo "Utilities configured"

      # ---------------------------------------------------------------
      # Combined operations (most common use-cases)
      # ---------------------------------------------------------------

      - name: Grant application access
        if: github.event.inputs.operation == 'grant-app-access'
        env:
          MEMBER_EMAIL: ${{ github.event.inputs.member_email }}
          GROUP_NAME: ${{ github.event.inputs.group_name }}
        run: |
          set -euo pipefail
          source /tmp/mckid_utils.sh

          if [ -z "$MEMBER_EMAIL" ]; then
            echo "::error::member_email is required for grant-app-access operation"
            exit 1
          fi

          GROUP_LABEL="${GROUP_NAME}"
          if [ -z "$GROUP_LABEL" ]; then
            echo "::error::group_name is required for grant-app-access operation"
            exit 1
          fi

          validate_emails "$MEMBER_EMAIL"
          register_email_masks "$MEMBER_EMAIL"
          MASKED=$(mask_emails_batch "$MEMBER_EMAIL")
          COUNT=$(count_csv "$MEMBER_EMAIL")
          echo "Granting application access for ${COUNT} user(s): ${MASKED}"

          # Validate group exists before making changes
          resolve_group_id "$GROUP_LABEL"

          # Step 1: Add as stack members (batch)
          echo "--- Step 1/2: Adding ${COUNT} user(s) as stack members ---"

          PAYLOAD=$(normalize_emails "$MEMBER_EMAIL" | jq -R . | jq -s --arg sid "$MCKID_STACK_ID" '
            . as $emails |
            ($emails | map("{login: \"" + . + "\"}") | join(", ")) as $users |
            ($emails | map("\"" + . + "\"") | join(", ")) as $logins |
            {query: ("mutation { AddMembers(stackId: \"" + $sid + "\", users: [" + $users + "]) { id users: members(where: {login: {_in: [" + $logins + "]}}) { ... on User { id login firstName lastName status } } } }")}')

          mckid_gql "$PAYLOAD"
          mask_pii_json "$RESPONSE"
          echo "::notice::Stack membership granted."

          # Step 2: Add to application group (batch)
          echo "--- Step 2/2: Adding ${COUNT} user(s) to group ${GROUP_LABEL} ---"

          PAYLOAD=$(normalize_emails "$MEMBER_EMAIL" | jq -R . | jq -s --arg sid "$MCKID_STACK_ID" --arg gl "$GROUP_LABEL" '
            . as $emails |
            ($emails | map("{login: \"" + . + "\"}") | join(", ")) as $users |
            {query: ("mutation { AddMembers(stackId: \"" + $sid + "\", groups: [{label: \"" + $gl + "\", name: \"" + $gl + "\", users: [" + $users + "]}]) { id members { __typename ... on Group { id name label } } } }")}')

          mckid_gql "$PAYLOAD"
          mask_pii_json "$RESPONSE"
          echo "::notice::${COUNT} user(s) granted application access successfully: ${MASKED}"

      - name: Revoke application access
        if: github.event.inputs.operation == 'revoke-app-access'
        env:
          MEMBER_EMAIL: ${{ github.event.inputs.member_email }}
          GROUP_NAME: ${{ github.event.inputs.group_name }}
        run: |
          set -euo pipefail
          source /tmp/mckid_utils.sh

          if [ -z "$MEMBER_EMAIL" ]; then
            echo "::error::member_email is required for revoke-app-access operation"
            exit 1
          fi

          GROUP_LABEL="${GROUP_NAME}"
          if [ -z "$GROUP_LABEL" ]; then
            echo "::error::group_name is required for revoke-app-access operation"
            exit 1
          fi

          validate_emails "$MEMBER_EMAIL"
          register_email_masks "$MEMBER_EMAIL"
          MASKED=$(mask_emails_batch "$MEMBER_EMAIL")
          COUNT=$(count_csv "$MEMBER_EMAIL")
          echo "Revoking application access for ${COUNT} user(s): ${MASKED}"

          echo "Removing ${COUNT} user(s) from group ${GROUP_LABEL}..."

          PAYLOAD=$(normalize_emails "$MEMBER_EMAIL" | jq -R . | jq -s --arg sid "$MCKID_STACK_ID" --arg gl "$GROUP_LABEL" '
            . as $emails |
            ($emails | map("{login: \"" + . + "\"}") | join(", ")) as $users |
            {query: ("mutation { RemoveMembers(stackId: \"" + $sid + "\", groups: [{label: \"" + $gl + "\", name: \"" + $gl + "\", users: [" + $users + "]}]) { id } }")}')

          mckid_gql "$PAYLOAD"
          mask_pii_json "$RESPONSE"
          echo "::notice::${COUNT} user(s) revoked from application access successfully."

      # ---------------------------------------------------------------
      # Individual operations (all support comma-separated batch emails)
      # ---------------------------------------------------------------

      - name: Add stack member
        if: github.event.inputs.operation == 'add-stack-member'
        env:
          MEMBER_EMAIL: ${{ github.event.inputs.member_email }}
        run: |
          set -euo pipefail
          source /tmp/mckid_utils.sh

          if [ -z "$MEMBER_EMAIL" ]; then
            echo "::error::member_email is required for add-stack-member operation"
            exit 1
          fi

          validate_emails "$MEMBER_EMAIL"
          register_email_masks "$MEMBER_EMAIL"
          MASKED=$(mask_emails_batch "$MEMBER_EMAIL")
          COUNT=$(count_csv "$MEMBER_EMAIL")
          echo "Adding ${COUNT} user(s) as stack members: ${MASKED}"

          PAYLOAD=$(normalize_emails "$MEMBER_EMAIL" | jq -R . | jq -s --arg sid "$MCKID_STACK_ID" '
            . as $emails |
            ($emails | map("{login: \"" + . + "\"}") | join(", ")) as $users |
            ($emails | map("\"" + . + "\"") | join(", ")) as $logins |
            {query: ("mutation { AddMembers(stackId: \"" + $sid + "\", users: [" + $users + "]) { id users: members(where: {login: {_in: [" + $logins + "]}}) { ... on User { id login firstName lastName status } } } }")}')

          mckid_gql "$PAYLOAD"
          mask_pii_json "$RESPONSE"
          echo "::notice::${COUNT} user(s) added as stack members successfully."

      - name: Remove stack member
        if: github.event.inputs.operation == 'remove-stack-member'
        env:
          MEMBER_EMAIL: ${{ github.event.inputs.member_email }}
        run: |
          set -euo pipefail
          source /tmp/mckid_utils.sh

          if [ -z "$MEMBER_EMAIL" ]; then
            echo "::error::member_email is required for remove-stack-member operation"
            exit 1
          fi

          validate_emails "$MEMBER_EMAIL"
          register_email_masks "$MEMBER_EMAIL"
          MASKED=$(mask_emails_batch "$MEMBER_EMAIL")
          COUNT=$(count_csv "$MEMBER_EMAIL")
          echo "Removing ${COUNT} user(s) from stack: ${MASKED}"

          PAYLOAD=$(normalize_emails "$MEMBER_EMAIL" | jq -R . | jq -s --arg sid "$MCKID_STACK_ID" '
            . as $emails |
            ($emails | map("\"" + . + "\"") | join(", ")) as $email_list |
            {query: ("mutation { RemoveMembers(stackId: \"" + $sid + "\", users: [" + $email_list + "]) { id } }")}')

          mckid_gql "$PAYLOAD"
          mask_pii_json "$RESPONSE"
          echo "::notice::${COUNT} user(s) removed from stack successfully."

      - name: Add group member
        if: github.event.inputs.operation == 'add-group-member'
        env:
          MEMBER_EMAIL: ${{ github.event.inputs.member_email }}
          GROUP_NAME: ${{ github.event.inputs.group_name }}
        run: |
          set -euo pipefail
          source /tmp/mckid_utils.sh

          if [ -z "$MEMBER_EMAIL" ]; then
            echo "::error::member_email is required for add-group-member operation"
            exit 1
          fi

          GROUP_LABEL="${GROUP_NAME}"
          if [ -z "$GROUP_LABEL" ]; then
            echo "::error::group_name is required for add-group-member operation"
            exit 1
          fi

          validate_emails "$MEMBER_EMAIL"
          register_email_masks "$MEMBER_EMAIL"
          MASKED=$(mask_emails_batch "$MEMBER_EMAIL")
          COUNT=$(count_csv "$MEMBER_EMAIL")

          resolve_group_id "$GROUP_LABEL"

          echo "Adding ${COUNT} user(s) to group ${GROUP_LABEL}: ${MASKED}"

          PAYLOAD=$(normalize_emails "$MEMBER_EMAIL" | jq -R . | jq -s --arg sid "$MCKID_STACK_ID" --arg gl "$GROUP_LABEL" '
            . as $emails |
            ($emails | map("{login: \"" + . + "\"}") | join(", ")) as $users |
            {query: ("mutation { AddMembers(stackId: \"" + $sid + "\", groups: [{label: \"" + $gl + "\", name: \"" + $gl + "\", users: [" + $users + "]}]) { id members { __typename ... on Group { id name label } } } }")}')

          mckid_gql "$PAYLOAD"
          mask_pii_json "$RESPONSE"
          echo "::notice::${COUNT} user(s) added to group ${GROUP_LABEL} successfully."

      - name: Remove group member
        if: github.event.inputs.operation == 'remove-group-member'
        env:
          MEMBER_EMAIL: ${{ github.event.inputs.member_email }}
          GROUP_NAME: ${{ github.event.inputs.group_name }}
        run: |
          set -euo pipefail
          source /tmp/mckid_utils.sh

          if [ -z "$MEMBER_EMAIL" ]; then
            echo "::error::member_email is required for remove-group-member operation"
            exit 1
          fi

          GROUP_LABEL="${GROUP_NAME}"
          if [ -z "$GROUP_LABEL" ]; then
            echo "::error::group_name is required for remove-group-member operation"
            exit 1
          fi

          validate_emails "$MEMBER_EMAIL"
          register_email_masks "$MEMBER_EMAIL"
          MASKED=$(mask_emails_batch "$MEMBER_EMAIL")
          COUNT=$(count_csv "$MEMBER_EMAIL")

          echo "Removing ${COUNT} user(s) from group ${GROUP_LABEL}: ${MASKED}"

          PAYLOAD=$(normalize_emails "$MEMBER_EMAIL" | jq -R . | jq -s --arg sid "$MCKID_STACK_ID" --arg gl "$GROUP_LABEL" '
            . as $emails |
            ($emails | map("{login: \"" + . + "\"}") | join(", ")) as $users |
            {query: ("mutation { RemoveMembers(stackId: \"" + $sid + "\", groups: [{label: \"" + $gl + "\", name: \"" + $gl + "\", users: [" + $users + "]}]) { id } }")}')

          mckid_gql "$PAYLOAD"
          mask_pii_json "$RESPONSE"
          echo "::notice::${COUNT} user(s) removed from group ${GROUP_LABEL} successfully."

      - name: Create PKCE asset
        if: github.event.inputs.operation == 'create-pkce-asset'
        env:
          ASSET_NAME: ${{ github.event.inputs.asset_name }}
        run: |
          set -euo pipefail
          source /tmp/mckid_utils.sh

          if [ -z "$ASSET_NAME" ]; then
            echo "::error::asset_name is required for create-pkce-asset operation"
            exit 1
          fi

          echo "Creating OIDC PKCE asset '${ASSET_NAME}' in stack ${MCKID_STACK_ID}"

          PAYLOAD=$(jq -n --arg sid "$MCKID_STACK_ID" --arg name "$ASSET_NAME" \
            '{query: ("mutation { CreateOidcPkceAsset(stackId: \"" + $sid + "\", label: \"" + $name + "\", name: \"" + $name + "\", asset: { redirectUris: [\"https://placeholder.mckinsey.com/callback\"], corsOrigins: [\"https://placeholder.mckinsey.com\"] }) { id clientId name label providerConfigurationUrl } }")}')

          mckid_gql "$PAYLOAD"
          echo "$RESPONSE" | jq '.'

          CLIENT_ID=$(echo "$RESPONSE" | jq -r '.data.CreateOidcPkceAsset.clientId // empty')
          if [ -z "$CLIENT_ID" ]; then
            echo "::error::Failed to create PKCE asset. Check the response above."
            exit 1
          fi
          echo "PKCE asset created successfully. Client ID: ${CLIENT_ID}"
          echo "::notice::Use the 'update-asset-redirect-uris' operation to set your application's redirect URIs."

      - name: Update asset redirect URIs
        if: github.event.inputs.operation == 'update-asset-redirect-uris'
        env:
          REDIRECT_URIS: ${{ github.event.inputs.redirect_uris }}
          CORS_ORIGINS: ${{ github.event.inputs.cors_origins }}
        run: |
          set -euo pipefail
          source /tmp/mckid_utils.sh

          if [ -z "$REDIRECT_URIS" ]; then
            echo "::error::redirect_uris is required for update-asset-redirect-uris operation"
            exit 1
          fi

          # Parse and validate redirect URIs using jq for safe quoting
          REDIRECT_URIS_JSON=$(echo "$REDIRECT_URIS" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | sed '/^$/d' | jq -R . | jq -s .)

          # Validate each URI starts with http:// or https:// and contains no quotes
          INVALID=$(echo "$REDIRECT_URIS_JSON" | jq -r '.[] | select(test("^https?://") | not)')
          if [ -n "$INVALID" ]; then
            echo "::error::All redirect URIs must start with http:// or https://. Invalid: ${INVALID}"
            exit 1
          fi
          QUOTE_CHECK=$(echo "$REDIRECT_URIS_JSON" | jq -r '.[] | select(contains("\""))')
          if [ -n "$QUOTE_CHECK" ]; then
            echo "::error::Redirect URIs must not contain double-quote characters."
            exit 1
          fi

          # Build GraphQL array string from JSON array: "uri1","uri2"
          REDIRECT_URIS_GQL=$(echo "$REDIRECT_URIS_JSON" | jq -r 'map("\"" + . + "\"") | join(",")')

          # Derive CORS origins by extracting scheme://authority from each URI
          CORS_INPUT="${CORS_ORIGINS:-$REDIRECT_URIS}"
          CORS_ORIGINS_JSON=$(echo "$CORS_INPUT" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | sed '/^$/d' \
            | jq -R 'capture("^(?<origin>https?://[^/]+)") | .origin' | jq -s 'unique')
          CORS_ORIGINS_GQL=$(echo "$CORS_ORIGINS_JSON" | jq -r 'map("\"" + . + "\"") | join(",")')

          # Get the asset ID
          PAYLOAD=$(jq -n --arg sid "$MCKID_STACK_ID" \
            '{query: ("query { Stack(id: \"" + $sid + "\") { assets { __typename ... on OidcPkceAsset { id label } } } }")}')

          mckid_gql "$PAYLOAD"

          ASSET_ID=$(echo "$RESPONSE" | jq -r --arg ueid "$USER_ENVIRONMENT_ID" \
            '[.data.Stack | if type == "array" then .[0] else . end | .assets[] | select(.label | contains($ueid)) | .id] | .[0] // empty')

          if [ -z "$ASSET_ID" ]; then
            echo "::error::Could not find OIDC PKCE asset for instance ${USER_ENVIRONMENT_ID}"
            exit 1
          fi

          echo "Updating asset ${ASSET_ID} with redirect URIs: ${REDIRECT_URIS}"

          PAYLOAD=$(jq -n \
            --arg aid "$ASSET_ID" \
            --arg ruris "$REDIRECT_URIS_GQL" \
            --arg coris "$CORS_ORIGINS_GQL" \
            '{query: ("mutation { UpdateOidcPkceAsset(id: \"" + $aid + "\", asset: { redirectUris: [" + $ruris + "], corsOrigins: [" + $coris + "] }) { id clientId redirectUris corsOrigins } }")}')

          mckid_gql "$PAYLOAD"
          echo "$RESPONSE" | jq '.'

      - name: List stack details
        if: github.event.inputs.operation == 'list-stack-details'
        run: |
          set -euo pipefail
          source /tmp/mckid_utils.sh
          echo "Fetching stack details for ${MCKID_STACK_ID}"

          PAYLOAD=$(jq -n --arg sid "$MCKID_STACK_ID" \
            '{query: ("query { Stack(id: \"" + $sid + "\") { id label name assets { __typename ... on OidcPkceAsset { id clientId label name providerConfigurationUrl } ... on Saml2Asset { id clientId label name } } members { __typename ... on Group { id label name } ... on GroupInheritedByRule { id label name ruleLabel } } } }")}')

          mckid_gql "$PAYLOAD"
          mask_pii_json "$RESPONSE"
