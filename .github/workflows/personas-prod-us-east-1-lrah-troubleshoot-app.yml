name: personas-prod-us-Troubleshoot namespace

on:
  workflow_dispatch:
    inputs:
      pod_name:
        description: 'Specific pod name to diagnose (leave empty for all pods)'
        type: string
        required: false
        default: ''
      label_selector:
        description: 'Label selector to filter pods (e.g. app=myapp)'
        type: string
        required: false
        default: ''
      log_tail_lines:
        description: 'Number of log lines to collect per container'
        type: string
        required: false
        default: '50'

jobs:
  load-environment-vars:
    name: environment-context
    runs-on: [gh-larger-linux-mini]
    environment: personas-prod-us-east-1
    outputs:
      CLUSTER_LOGIN_URL: ${{ vars.KUBERNETES_CLUSTER_LOGIN_URL }}
      KUBERNETES_NAMESPACE_NAME: ${{ vars.KUBERNETES_NAMESPACE_NAME }}

    steps:
      - name: Run
        run: |
          echo "CLUSTER_LOGIN_URL: ${{ vars.KUBERNETES_CLUSTER_LOGIN_URL }}"
          echo "KUBERNETES_NAMESPACE_NAME: ${{ vars.KUBERNETES_NAMESPACE_NAME }}"

  troubleshoot:
    name: Namespace diagnostics
    needs: [load-environment-vars]
    uses: McK-Internal/lrah-control-plane/.github/workflows/lrah-reusable-diagnose-namespace.yaml@v1.38.0
    with:
      cluster_login_url: ${{ needs.load-environment-vars.outputs.CLUSTER_LOGIN_URL }}
      kubernetes_namespace_name: ${{ needs.load-environment-vars.outputs.KUBERNETES_NAMESPACE_NAME }}
      pod_name: ${{ github.event.inputs.pod_name }}
      label_selector: ${{ github.event.inputs.label_selector }}
      log_tail_lines: ${{ github.event.inputs.log_tail_lines }}
      fail_on_unhealthy: false
