<!DOCTYPE html>
<html lang="en">
<head>
  <script>try{var k="cif-theme";var t=localStorage.getItem(k);if(t!=="light"&&t!=="dark")t=matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light";document.documentElement.setAttribute("data-theme",t);}catch(e){document.documentElement.setAttribute("data-theme","light");}</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archetype — User Intelligence Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="uip-nav.css">
  <link rel="stylesheet" href="uip-page.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --sidebar-bg: #1e3a5f;
      --sidebar-text: #ffffff;
      --sidebar-muted: rgba(255,255,255,0.75);
      --main-bg: #f0f2f5;
      --main-text: #263238;
      --main-muted: #546e7a;
      --accent: #1976d2;
      --accent-light: #e3f2fd;
    }
    body { font-family: 'Inter', -apple-system, sans-serif; background: var(--main-bg); color: var(--main-text); line-height: 1.6; -webkit-font-smoothing: antialiased; min-height: 100vh; }
    .page { display: flex; min-height: 100vh; }
    .back-bar { background: #fff; border-bottom: 1px solid #e0e0e0; padding: 12px 24px; }
    .back-bar a { color: var(--accent); text-decoration: none; font-size: 14px; font-weight: 500; display: inline-flex; align-items: center; gap: 6px; }
    .back-bar a:hover { text-decoration: underline; }
    .sidebar { width: 320px; flex-shrink: 0; background: var(--sidebar-bg); color: var(--sidebar-text); padding: 32px 24px; overflow-y: auto; }
    .sidebar-photo { width: 120px; height: 120px; border-radius: 50%; overflow: hidden; margin: 0 auto 16px; border: 3px solid rgba(255,255,255,0.2); }
    .sidebar-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .sidebar-name { font-size: 28px; font-weight: 800; letter-spacing: 0.05em; text-align: center; margin-bottom: 4px; }
    .sidebar-role { font-size: 13px; color: var(--sidebar-muted); text-align: center; margin-bottom: 28px; }
    .sidebar-section { margin-bottom: 28px; }
    .sidebar-section-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--sidebar-muted); margin-bottom: 10px; }
    .sidebar-section ul, .sidebar-section .list { list-style: none; }
    .sidebar-section li, .sidebar-section .list-item { font-size: 13px; color: var(--sidebar-muted); padding: 4px 0; line-height: 1.5; }
    .device-pie { width: 140px; height: 140px; border-radius: 50%; margin: 0 auto 12px; background: conic-gradient(var(--accent) 0deg, var(--accent) calc(var(--laptop, 50) * 3.6deg), #2d5a8a calc(var(--laptop, 50) * 3.6deg), #2d5a8a calc((var(--laptop, 50) + var(--desktop, 30)) * 3.6deg), #3d6a9a calc((var(--laptop, 50) + var(--desktop, 30)) * 3.6deg), #3d6a9a 360deg); }
    .device-legend { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; font-size: 11px; color: var(--sidebar-muted); }
    .region-block { margin-bottom: 12px; }
    .region-block strong { font-size: 11px; color: var(--sidebar-muted); display: block; margin-bottom: 4px; }
    .region-block ul { list-style: none; }
    .region-block li { font-size: 12px; color: var(--sidebar-muted); padding: 2px 0; }
    .main { flex: 1; padding: 40px 48px 60px; overflow-y: auto; max-width: 900px; }
    .main-title { font-size: 32px; font-weight: 800; color: var(--main-text); margin-bottom: 8px; letter-spacing: -0.5px; }
    .main-tagline { font-size: 16px; font-style: italic; color: var(--main-muted); margin-bottom: 24px; }
    .main p { font-size: 15px; line-height: 1.8; color: var(--main-muted); margin-bottom: 28px; }
    .main-section { margin-bottom: 32px; }
    .main-section-title { font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--main-text); margin-bottom: 12px; }
    .how-grid { display: grid; grid-template-columns: 1fr auto; gap: 32px; align-items: start; }
    .how-list { list-style: none; }
    .how-list li { font-size: 14px; color: var(--main-muted); padding: 6px 0; padding-left: 20px; position: relative; }
    .how-list li::before { content: ''; position: absolute; left: 0; top: 12px; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
    .trait-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .trait-icon { width: 64px; height: 64px; border-radius: 50%; background: var(--accent-light); color: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 24px; margin: 0 auto 6px; }
    .trait-label { font-size: 11px; font-weight: 600; text-align: center; color: var(--main-text); line-height: 1.3; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
    .motivations-list, .challenges-list { list-style: none; }
    .motivations-list li, .challenges-list li { font-size: 14px; color: var(--main-muted); padding: 5px 0; padding-left: 18px; position: relative; }
    .motivations-list li::before { content: '•'; position: absolute; left: 0; color: var(--accent); font-weight: 700; }
    .challenges-list li::before { content: '•'; position: absolute; left: 0; color: #c62828; font-weight: 700; }
    .toolkit-cat { margin-bottom: 16px; }
    .toolkit-cat-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--main-muted); margin-bottom: 8px; }
    .toolkit-icons { display: flex; flex-wrap: wrap; gap: 10px; }
    .toolkit-icon { width: 36px; height: 36px; border-radius: 8px; background: var(--accent-light); color: var(--accent); font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
    .channel-row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; font-size: 13px; }
    .channel-name { width: 100px; flex-shrink: 0; color: var(--main-muted); }
    .channel-bar { flex: 1; height: 8px; background: #e0e0e0; border-radius: 4px; overflow: hidden; }
    .channel-bar-fill { height: 100%; background: var(--accent); border-radius: 4px; }
    .footer-note { margin-top: 48px; padding-top: 24px; border-top: 1px solid #e0e0e0; font-size: 14px; color: var(--main-muted); text-align: center; }
    .footer-placeholder { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #b0bec5; margin-top: 8px; }
    .not-found { padding: 60px 24px; text-align: center; }
    .not-found h1 { font-size: 24px; margin-bottom: 12px; }
    .not-found a { color: var(--accent); }
    @media (max-width: 900px) {
      .page { flex-direction: column; }
      .sidebar { width: 100%; padding: 24px; }
      .how-grid { grid-template-columns: 1fr; }
      .two-col { grid-template-columns: 1fr; }
      .trait-grid { grid-template-columns: repeat(2, 1fr); }
      .main { padding: 24px; }
    }
  </style>
</head>
<body>
  <header class="uip-topbar" id="uip-global-nav">
    <div class="uip-topbar-inner">
      <a href="homepage.html" class="uip-brand">User Intelligence Platform</a>
      <nav class="uip-nav-main" aria-label="Primary">
        <a class="uip-nav-link" href="homepage.html#persona-simulation">Persona Simulation</a>
        <div class="uip-nav-item has-dropdown">
          <button type="button" class="uip-nav-dd-trigger" aria-expanded="false" aria-haspopup="true">Persona Library <span class="uip-caret" aria-hidden="true"></span></button>
          <div class="uip-dropdown" role="menu">
            <a href="onedata-personas.html" role="menuitem">One Data</a>
            <a href="persona-library-tech-ecosystem.html" role="menuitem">Tech Ecosystem</a>
          </div>
        </div>
        <a class="uip-nav-link" href="archetypes.html">Archetypes</a>
        <div class="uip-nav-item has-dropdown">
          <button type="button" class="uip-nav-dd-trigger" aria-expanded="false" aria-haspopup="true">User Journey <span class="uip-caret" aria-hidden="true"></span></button>
          <div class="uip-dropdown" role="menu">
            <a href="onedata-journey-maps.html" role="menuitem">One Data</a>
            <a href="user-journey-tech-ecosystem.html" role="menuitem">Tech Ecosystem</a>
          </div>
        </div>
        <a class="uip-nav-link" href="knowledgebase.html">Knowledgebase</a>
      </nav>
      <div class="uip-trailing">
        <button type="button" class="theme-toggle uip-theme-btn" id="theme-toggle" title="Toggle light / dark theme">
          <svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        </button>
      </div>
    </div>
  </header>

  <section class="uip-page-hero uip-page-hero--blank" aria-hidden="true"></section>

  <div class="back-bar">
    <a href="archetypes.html">&larr; Back to Archetypes</a>
  </div>
  <div class="page" id="page">
    <div class="not-found" id="notFound" style="display:none;">
      <h1>Archetype not found</h1>
      <p><a href="archetypes.html">Return to Archetypes</a></p>
    </div>
    <div id="content" style="display:none; flex:1; width:100%;"></div>
  </div>
  <script src="archetypes.js"></script>
  <script>
    (function() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      if (!id) {
        document.getElementById('notFound').style.display = 'block';
        return;
      }
      const list = window.archetypeData && window.archetypeData.list ? window.archetypeData.list : [];
      const a = list.find(function(x) { return x.id === id; });
      if (!a) {
        document.getElementById('notFound').style.display = 'block';
        return;
      }
      document.title = a.name + ' — ' + a.role + ' | User Intelligence Platform';
      const du = a.deviceUsage || { laptop: 50, desktop: 30, mobile: 20 };
      const total = (du.laptop || 0) + (du.desktop || 0) + (du.mobile || 0) || 100;
      const laptopPct = Math.round(((du.laptop || 0) / total) * 100);
      const desktopPct = Math.round(((du.desktop || 0) / total) * 100);
      const mobilePct = 100 - laptopPct - desktopPct;
      const avatarUrl = a.avatar || '';

      function renderList(items) {
        if (!items || !items.length) return '';
        return '<ul class="list">' + items.map(function(i) { return '<li class="list-item">' + i + '</li>'; }).join('') + '</ul>';
      }
      function renderRegional(reg) {
        if (!reg || typeof reg !== 'object') return '';
        var html = [];
        ['APAC', 'EMEA', 'LatAm', 'NA'].forEach(function(region) {
          if (reg[region] && reg[region].length) {
            html.push('<div class="region-block"><strong>' + region + '</strong><ul>' + reg[region].map(function(s) { return '<li>' + s + '</li>'; }).join('') + '</ul></div>');
          }
        });
        return html.join('');
      }
      function renderChannels(channels) {
        if (!channels) return '';
        var html = [];
        ['communication', 'support'].forEach(function(k) {
          var arr = channels[k];
          if (!arr || !arr.length) return;
          html.push('<div class="toolkit-cat"><div class="toolkit-cat-title">' + (k === 'communication' ? 'Communication' : 'Support') + '</div>');
          arr.forEach(function(c) {
            var pct = Math.min(100, Math.max(0, c.level || 0));
            html.push('<div class="channel-row"><span class="channel-name">' + (c.name || '') + '</span><div class="channel-bar"><div class="channel-bar-fill" style="width:' + pct + '%"></div></div></div>');
          });
          html.push('</div>');
        });
        return html.join('');
      }
      function renderToolkit(toolkit) {
        if (!toolkit) return '';
        var html = [];
        ['produce', 'collaborate', 'administrate'].forEach(function(k) {
          var arr = toolkit[k];
          if (!arr || !arr.length) return;
          html.push('<div class="toolkit-cat"><div class="toolkit-cat-title">' + (k.charAt(0).toUpperCase() + k.slice(1)) + '</div><div class="toolkit-icons">');
          arr.forEach(function(t) { html.push('<div class="toolkit-icon">' + (t.length > 2 ? t.substring(0, 2) : t) + '</div>'); });
          html.push('</div></div>');
        });
        return html.join('');
      }

      var traitsHtml = (a.traitIcons && a.traitIcons.length) ? a.traitIcons.map(function(t) {
        return '<div><div class="trait-icon">&#9679;</div><div class="trait-label">' + t + '</div></div>';
      }).join('') : '';

      var coreLabel = a.coreExperiences ? 'CORE EXPERIENCES' : 'CORE JOURNEYS';
      var coreItems = a.coreExperiences || a.coreJourneys || [];

      var sidebarHtml = '<div class="sidebar">' +
        '<div class="sidebar-photo"><img src="' + avatarUrl + '" alt="' + a.name + '" /></div>' +
        '<div class="sidebar-name">' + a.name.toUpperCase() + '</div>' +
        '<div class="sidebar-role">' + (a.role || '') + '</div>' +
        (a.otherRoles && a.otherRoles.length ? '<div class="sidebar-section"><div class="sidebar-section-title">Other roles</div>' + renderList(a.otherRoles) + '</div>' : '') +
        (a.deviceUsage ? '<div class="sidebar-section"><div class="sidebar-section-title">Device usage</div><div class="device-pie" style="--laptop:' + laptopPct + ';--desktop:' + desktopPct + ';"></div><div class="device-legend"><span>Laptop ' + laptopPct + '%</span><span>Desktop ' + desktopPct + '%</span><span>Mobile ' + mobilePct + '%</span></div></div>' : '') +
        (coreItems.length ? '<div class="sidebar-section"><div class="sidebar-section-title">' + coreLabel + '</div>' + renderList(coreItems) + '</div>' : '') +
        (a.keyCollaborators && a.keyCollaborators.length ? '<div class="sidebar-section"><div class="sidebar-section-title">Key collaborators</div>' + renderList(a.keyCollaborators) + '</div>' : '') +
        (a.regionalConsiderations && Object.keys(a.regionalConsiderations).length ? '<div class="sidebar-section"><div class="sidebar-section-title">Regional considerations</div>' + renderRegional(a.regionalConsiderations) + '</div>' : '') +
        '</div>';

      var mainHtml = '<div class="main">' +
        '<h1 class="main-title">' + (a.role || '') + '</h1>' +
        (a.tagline ? '<p class="main-tagline">' + a.tagline + '</p>' : '') +
        (a.description ? '<p>' + a.description + '</p>' : '') +
        (a.howSpendsTime && a.howSpendsTime.length ? '<div class="main-section"><div class="main-section-title">How ' + a.name + ' spends their time</div><div class="how-grid"><ul class="how-list">' + a.howSpendsTime.map(function(h) { return '<li>' + h + '</li>'; }).join('') + '</ul><div class="trait-grid">' + traitsHtml + '</div></div></div>' : '') +
        '<div class="main-section"><div class="two-col">' +
        (a.motivations && a.motivations.length ? '<div><div class="main-section-title">Motivations</div><ul class="motivations-list">' + a.motivations.map(function(m) { return '<li>' + m + '</li>'; }).join('') + '</ul></div>' : '') +
        (a.challenges && a.challenges.length ? '<div><div class="main-section-title">Challenges</div><ul class="challenges-list">' + a.challenges.map(function(c) { return '<li>' + c + '</li>'; }).join('') + '</ul></div>' : '') +
        '</div></div>' +
        (a.dailyToolkit ? '<div class="main-section"><div class="main-section-title">Daily toolkit</div>' + renderToolkit(a.dailyToolkit) + '</div>' : '') +
        (a.preferredChannels ? '<div class="main-section"><div class="main-section-title">Preferred channels</div>' + renderChannels(a.preferredChannels) + '</div>' : '') +
        '<div class="footer-note">' + a.name + ' and their friends: About our ' + (a.role ? a.role + 's' : 'Archetypes') + '</div><div class="footer-placeholder">Placeholder for demographic analysis</div>' +
        '</div>';

      var wrap = document.getElementById('content');
      wrap.innerHTML = sidebarHtml + mainHtml;
      wrap.style.display = 'flex';
    })();
  </script>
  <script src="site-theme.js"></script>
  <script src="uip-nav.js"></script>
</body>
</html>
