<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archetype — Customer Insight Frameworks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --sidebar: #1a2c42;
      --sidebar-text: #fff;
      --main-bg: #f5f6f8;
      --text: #263238;
      --text-secondary: #455a64;
      --accent: #2196F3;
      --radius: 6px;
    }
    body { font-family: 'Inter', -apple-system, sans-serif; color: var(--text); line-height: 1.6; -webkit-font-smoothing: antialiased; background: var(--main-bg); }

    .top-bar {
      background: var(--sidebar);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .top-bar a {
      color: rgba(255,255,255,0.9);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
    }
    .top-bar a:hover { color: #fff; }

    .layout {
      display: flex;
      min-height: calc(100vh - 48px);
    }

    .sidebar {
      width: 320px;
      min-width: 280px;
      background: var(--sidebar);
      color: var(--sidebar-text);
      padding: 32px 24px;
      overflow-y: auto;
    }
    .sidebar-photo {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      overflow: hidden;
      margin: 0 auto 16px;
      display: block;
      border: 3px solid rgba(255,255,255,0.2);
    }
    .sidebar-photo img { width: 100%; height: 100%; object-fit: cover; }
    .sidebar-name {
      font-size: 28px;
      font-weight: 800;
      text-align: center;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .sidebar-role { font-size: 13px; text-align: center; opacity: 0.9; margin-bottom: 24px; }

    .sidebar-section { margin-bottom: 28px; }
    .sidebar-section-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      opacity: 0.8;
      margin-bottom: 12px;
    }
    .sidebar-section ul { list-style: none; }
    .sidebar-section li { font-size: 12px; padding: 4px 0; padding-left: 14px; position: relative; }
    .sidebar-section li::before { content: '•'; position: absolute; left: 0; opacity: 0.7; }

    .device-pie {
      width: 140px;
      height: 140px;
      margin: 0 auto 12px;
      border-radius: 50%;
      background: conic-gradient(#42a5f5 0% var(--p1), #1e88e5 var(--p1) var(--p2), #1565c0 var(--p2) 100%);
    }
    .device-legend { font-size: 11px; text-align: center; opacity: 0.85; }

    .region-block { margin-bottom: 12px; }
    .region-name { font-size: 11px; font-weight: 700; margin-bottom: 4px; opacity: 0.9; }
    .region-block ul { margin: 0; padding-left: 14px; }
    .region-block li { font-size: 11px; padding: 2px 0; }

    .main {
      flex: 1;
      padding: 40px 48px 60px;
      overflow-y: auto;
      background: var(--main-bg);
    }
    .main-inner { max-width: 820px; }

    .main-title { font-size: 36px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; margin-bottom: 8px; }
    .main-tagline { font-size: 17px; font-style: italic; color: var(--text-secondary); margin-bottom: 24px; }
    .main-narrative { font-size: 15px; color: var(--text-secondary); line-height: 1.8; margin-bottom: 32px; }

    .section-title { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 16px; }
    .time-section { display: flex; gap: 32px; margin-bottom: 32px; flex-wrap: wrap; }
    .time-list { flex: 1; min-width: 280px; }
    .time-list ul { list-style: none; }
    .time-list li { font-size: 14px; color: var(--text-secondary); padding: 6px 0; padding-left: 20px; position: relative; }
    .time-list li::before { content: '•'; position: absolute; left: 0; color: var(--accent); font-weight: 700; }
    .time-icons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      max-width: 280px;
    }
    .time-icon {
      background: #e3f2fd;
      color: #1565c0;
      border-radius: 50%;
      width: 72px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 600;
      text-align: center;
      padding: 8px;
      line-height: 1.3;
    }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; margin-bottom: 32px; }
    .two-col .section-title { margin-bottom: 12px; }
    .two-col ul { list-style: none; }
    .two-col li { font-size: 14px; color: var(--text-secondary); padding: 5px 0; padding-left: 18px; position: relative; }
    .two-col li::before { content: '•'; position: absolute; left: 0; color: var(--accent); }

    .toolkit-section { margin-bottom: 32px; }
    .toolkit-cat { margin-bottom: 16px; }
    .toolkit-cat-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-secondary); margin-bottom: 8px; }
    .toolkit-icons { display: flex; flex-wrap: wrap; gap: 8px; }
    .toolkit-icon {
      background: #e3f2fd;
      color: #1565c0;
      font-size: 11px;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 4px;
    }

    .channel-bars { margin-bottom: 20px; }
    .channel-row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; font-size: 13px; }
    .channel-label { width: 100px; flex-shrink: 0; color: var(--text-secondary); }
    .channel-track { flex: 1; height: 8px; background: #e0e0e0; border-radius: 4px; overflow: hidden; }
    .channel-fill { height: 100%; background: var(--accent); border-radius: 4px; }

    .footer-block {
      margin-top: 48px;
      padding-top: 24px;
      border-top: 1px solid #e0e0e0;
      font-size: 15px; font-weight: 700; color: var(--text);
    }
    .footer-placeholder { font-size: 12px; color: #9e9e9e; text-transform: uppercase; letter-spacing: 1px; margin-top: 8px; }

    .empty-state { padding: 60px 24px; text-align: center; color: var(--text-secondary); }
    .empty-state a { color: var(--accent); }

    @media (max-width: 900px) {
      .layout { flex-direction: column; }
      .sidebar { width: 100%; padding: 24px; }
      .two-col { grid-template-columns: 1fr; }
      .time-section { flex-direction: column; }
      .time-icons { max-width: 100%; }
    }
    @media (max-width: 768px) {
      .main { padding: 24px 20px 40px; }
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <div>
      <a href="index.html">Customer Insight Frameworks</a>
      <a href="archetypes.html" style="margin-left: 16px;">&larr; All Archetypes</a>
      <a href="library.html" style="margin-left: 16px;">Persona Library</a>
    </div>
  </div>

  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main">
      <div class="main-inner" id="mainContent"></div>
    </main>
  </div>

  <script src="archetype-data.js"></script>
  <script>
    (function() {
      const params = new URLSearchParams(location.search);
      const id = params.get('id');
      if (!id) {
        document.getElementById('sidebar').innerHTML = '';
        document.getElementById('mainContent').innerHTML = '<div class="empty-state"><p>No archetype selected.</p><p><a href="archetypes.html">Browse archetypes</a></p></div>';
        return;
      }
      const a = archetypeData.archetypes.find(x => x.id === id);
      if (!a) {
        document.getElementById('sidebar').innerHTML = '';
        document.getElementById('mainContent').innerHTML = '<div class="empty-state"><p>Archetype not found.</p><p><a href="archetypes.html">Browse archetypes</a></p></div>';
        return;
      }

      document.title = a.name + ' — ' + a.role + ' | Archetypes';

      const du = a.deviceUsage || {};
      const total = (du.laptop || 0) + (du.mobile || 0) + (du.tablet || 0) + (du.desktop || 0) || 1;
      const p1 = ((du.laptop || 0) / total * 100).toFixed(1);
      const p2 = (((du.laptop || 0) + (du.mobile || 0)) / total * 100).toFixed(1);

      const otherRolesList = Array.isArray(a.otherRoles) ? a.otherRoles : (a.otherRoles ? [a.otherRoles] : []);
      const otherRolesHtml = otherRolesList.length ? '<ul><li>' + otherRolesList.join('</li><li>') + '</li></ul>' : '';

      let regionsHtml = '';
      if (a.regionalConsiderations && typeof a.regionalConsiderations === 'object') {
        regionsHtml = Object.entries(a.regionalConsiderations).map(([region, points]) => {
          const list = Array.isArray(points) ? points : [points];
          return '<div class="region-block"><div class="region-name">' + region + '</div><ul><li>' + list.join('</li><li>') + '</li></ul></div>';
        }).join('');
      }

      const coreList = a.coreJourneys || a.coreExperiences || [];
      const collabList = a.keyCollaborators || [];

      document.getElementById('sidebar').innerHTML = `
        <div class="sidebar-photo-wrap">
          <img class="sidebar-photo" src="${a.avatar}" alt="${a.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"/>
          <div class="sidebar-photo" style="display:none;align-items:center;justify-content:center;background:#2d3e52;font-size:36px;font-weight:700;">${a.name.substring(0,2)}</div>
        </div>
        <div class="sidebar-name">${a.name.toUpperCase()}</div>
        <div class="sidebar-role">${a.role}</div>
        ${otherRolesList.length ? '<div class="sidebar-section"><div class="sidebar-section-title">Other Roles</div>' + otherRolesHtml + '</div>' : ''}
        <div class="sidebar-section">
          <div class="sidebar-section-title">Device Usage</div>
          <div class="device-pie" style="--p1:${p1}%;--p2:${p2}%"></div>
          <div class="device-legend">Laptop ${du.laptop || 0}% · Mobile ${du.mobile || 0}% · Tablet ${du.tablet || 0}%</div>
        </div>
        ${coreList.length ? '<div class="sidebar-section"><div class="sidebar-section-title">Core Journeys</div><ul><li>' + coreList.join('</li><li>') + '</li></ul></div>' : ''}
        ${collabList.length ? '<div class="sidebar-section"><div class="sidebar-section-title">Key Collaborators</div><ul><li>' + collabList.join('</li><li>') + '</li></ul></div>' : ''}
        ${regionsHtml ? '<div class="sidebar-section"><div class="sidebar-section-title">Regional Considerations</div>' + regionsHtml + '</div>' : ''}
      `;

      const timeIconsHtml = (a.timeIcons || []).slice(0, 6).map(t => '<div class="time-icon">' + (t.label || '') + '</div>').join('');
      const toolkit = a.dailyToolkit || {};
      const produce = toolkit.produce || [];
      const collaborate = toolkit.collaborate || [];
      const administrate = toolkit.administrate || [];
      const toolkitHtml = `
        <div class="toolkit-cat"><div class="toolkit-cat-title">Produce</div><div class="toolkit-icons">${produce.map(t => '<span class="toolkit-icon">' + t + '</span>').join('')}</div></div>
        <div class="toolkit-cat"><div class="toolkit-cat-title">Collaborate</div><div class="toolkit-icons">${collaborate.map(t => '<span class="toolkit-icon">' + t + '</span>').join('')}</div></div>
        <div class="toolkit-cat"><div class="toolkit-cat-title">Administrate</div><div class="toolkit-icons">${administrate.map(t => '<span class="toolkit-icon">' + t + '</span>').join('')}</div></div>
      `;
      const comm = (a.preferredChannels && a.preferredChannels.communication) || [];
      const supp = (a.preferredChannels && a.preferredChannels.support) || [];
      const channelBars = (label, items) => '<div class="channel-bars"><div class="toolkit-cat-title">' + label + '</div>' + items.map(c => '<div class="channel-row"><span class="channel-label">' + c.name + '</span><div class="channel-track"><div class="channel-fill" style="width:' + (c.value || 0) + '%"></div></div></div>').join('') + '</div>';
      const channelsHtml = channelBars('Communication', comm) + channelBars('Support', supp);

      document.getElementById('mainContent').innerHTML = `
        <h1 class="main-title">${a.role}</h1>
        <p class="main-tagline">${a.tagline}</p>
        <div class="main-narrative">${a.narrative}</div>

        <div class="section-title">How ${a.name} spends their time</div>
        <div class="time-section">
          <div class="time-list"><ul>${(a.howSpendsTime || []).map(s => '<li>' + s + '</li>').join('')}</ul></div>
          <div class="time-icons">${timeIconsHtml}</div>
        </div>

        <div class="two-col">
          <div>
            <div class="section-title">Motivations</div>
            <ul>${(a.motivations || []).map(m => '<li>' + m + '</li>').join('')}</ul>
          </div>
          <div>
            <div class="section-title">Challenges</div>
            <ul>${(a.challenges || []).map(c => '<li>' + c + '</li>').join('')}</ul>
          </div>
        </div>

        <div class="toolkit-section">
          <div class="section-title">Daily toolkit</div>
          ${toolkitHtml}
        </div>

        <div class="toolkit-section">
          <div class="section-title">Preferred channels</div>
          ${channelsHtml}
        </div>

        <div class="footer-block">${a.footerTitle || (a.name + ' and friends')}</div>
        <div class="footer-placeholder">Placeholder for demographic analysis</div>
      `;
    })();
  </script>
</body>
</html>
